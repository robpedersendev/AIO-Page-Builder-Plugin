# * Local parity: `cd plugin && composer run ci`, or repo-root `tools/ci-local.ps1` / `tools/ci-local.sh`.
name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  php:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, json, zip
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: cd plugin && echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('plugin/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: cd plugin && composer install --prefer-dist --no-progress

      - name: Run PHPCS
        run: cd plugin && composer run phpcs
        continue-on-error: ${{ matrix.php != '8.1' }}

      - name: Run PHPStan
        run: cd plugin && composer run phpstan
        continue-on-error: ${{ matrix.php != '8.1' }}

      - name: Run PHPUnit
        run: cd plugin && composer run phpunit
        continue-on-error: ${{ matrix.php != '8.1' }}

  package:
    runs-on: ubuntu-latest
    needs: php

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP for packaging
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: zip
          coverage: none

      - name: Build release package
        run: php tools/build-release-package.php

      - name: Upload release package artifact
        uses: actions/upload-artifact@v4
        with:
          name: packaged-plugin
          path: |
            dist/release/aio-page-builder.zip
            dist/release/stage/aio-page-builder
          if-no-files-found: error

  smoke-install:
    runs-on: ubuntu-latest
    needs: package

    steps:
      - uses: actions/checkout@v4

      - name: Download packaged plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: packaged-plugin
          path: dist/release

      - name: Smoke test packaged plugin activation (Docker + WP-CLI)
        run: |
          set -e
          export PLUGIN_SOURCE="${GITHUB_WORKSPACE}/dist/release/stage/aio-page-builder"
          cd tools/plugin-check
          docker compose up -d db wordpress
          for i in $(seq 1 45); do
            if docker compose run --rm -T -u root wpcli wp core version --path=/var/www/html --allow-root >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          docker compose run --rm -T -u root wpcli wp core is-installed --path=/var/www/html --allow-root >/dev/null 2>&1 || \
            docker compose run --rm -T -u root wpcli wp core install \
              --url="http://localhost" --title="Packaged Plugin Smoke Test" --admin_user=admin --admin_password=admin \
              --admin_email=admin@example.test --path=/var/www/html --skip-email --allow-root
          docker compose run --rm -T -u root wpcli wp plugin activate aio-page-builder --path=/var/www/html --allow-root
          docker compose run --rm -T -u root wpcli wp plugin list --status=active --path=/var/www/html --allow-root

  plugin-check:
    runs-on: ubuntu-latest
    needs: package
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Download packaged plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: packaged-plugin
          path: dist/release

      - name: Plugin Check (Docker + WP-CLI)
        # * Full Plugin Check needs WordPress + DB + plugin-check; see tools/plugin-check/PROCEDURE.txt
        # * Flip continue-on-error to false when the ERROR baseline is addressed.
        continue-on-error: true
        run: |
          set -e
          export PLUGIN_SOURCE="${GITHUB_WORKSPACE}/dist/release/stage/aio-page-builder"
          cd tools/plugin-check
          docker compose up -d db wordpress
          for i in $(seq 1 45); do
            if docker compose run --rm -T -u root wpcli wp core version --path=/var/www/html --allow-root >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          docker compose run --rm -T -u root wpcli wp core is-installed --path=/var/www/html --allow-root >/dev/null 2>&1 || \
            docker compose run --rm -T -u root wpcli wp core install \
              --url="http://localhost" --title="PCP" --admin_user=admin --admin_password=admin \
              --admin_email=admin@example.test --path=/var/www/html --skip-email --allow-root
          docker compose run --rm -T -u root wpcli wp plugin install plugin-check --activate --path=/var/www/html --allow-root
          mkdir -p output
          docker compose run --rm -T -u root wpcli wp plugin check aio-page-builder \
            --path=/var/www/html \
            --require=/var/www/html/wp-content/plugins/plugin-check/cli.php \
            --format=json \
            --exclude-directories=tests,legacy,phpstan-fixtures,docs \
            --exclude-files=phpstan-bootstrap.php,phpstan-wordpress-overrides.stub.php,phpcs.xml.dist,phpstan.neon.dist,phpunit.xml.dist,.wp-env.json,.phpunit.result.cache \
            --allow-root \
            2>/dev/null > output/plugin-check-report.json
          php summarize-report.php output/plugin-check-report.json
          php exit-if-errors.php output/plugin-check-report.json

      - name: Upload Plugin Check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-check-report
          path: tools/plugin-check/output/plugin-check-report.json
          if-no-files-found: ignore
