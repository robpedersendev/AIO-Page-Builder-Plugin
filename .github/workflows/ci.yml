name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  php:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, json
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: cd plugin && echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: cd plugin && composer install --prefer-dist --no-progress

      - name: Run PHPCS
        run: cd plugin && composer run phpcs
        continue-on-error: ${{ matrix.php != '8.1' }}

      - name: Run PHPStan
        run: cd plugin && composer run phpstan
        continue-on-error: ${{ matrix.php != '8.1' }}

      - name: Run PHPUnit
        run: cd plugin && composer run phpunit
        continue-on-error: ${{ matrix.php != '8.1' }}
